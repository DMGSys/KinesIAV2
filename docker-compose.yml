version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: kinesia-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: kinesia
    volumes:
      - mongodb_data:/data/db
    networks:
      - kinesia-network

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: kinesia-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGO_URI=mongodb://mongodb:27017/kinesia
      - JWT_SECRET=kinesia-secret-key-2026-change-in-production
      - JWT_EXPIRES_IN=5m
      - VITE_API_URL=http://backend:3001
    depends_on:
      - mongodb
    networks:
      - kinesia-network

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: kinesia-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    networks:
      - kinesia-network

  nginx:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: kinesia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kinesia-network

volumes:
  mongodb_data:

networks:
  kinesia-network:
    driver: bridge